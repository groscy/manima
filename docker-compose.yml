# MANIMA deployment topology (tasks 3.1–3.2, design D1–D2).
#
# The MCP server is stdio-launched by its client per session — it is NOT a long-running
# service here (design D1). What compose owns is the *pieces* the deployment needs:
#
#   • render-image  — builds the pinned image every render container is spawned FROM.
#                     Build-only; `up` does not start it. The host server spawns short-lived
#                     containers from this image per render.
#   • qdrant        — the generate profile's grounding store. Opt-in only (design D2).
#
# vLLM is deliberately absent: it is GPU-bound and deployment-specific, exactly as
# scripts/bringup.sh already treats it. Point MANIMA_VLLM_URL at your own instance.
#
# Usage (prefer `make` — it injects the pinned version from version.py):
#   docker compose --profile image   build          # build manima-render:pinned
#   docker compose --profile generate up -d          # start Qdrant (generate path only)

name: manima

services:
  render-image:
    build:
      context: ./manima_server/docker
      args:
        # The single source of truth is manima_server/manima_server/version.py; `make`
        # exports MANIM_CE_VERSION from it. The default here is only a raw-compose fallback
        # and must be kept in step with version.py if used (design D6).
        MANIM_CE_VERSION: ${MANIM_CE_VERSION:-0.18.1}
    # Local build tags this name. To deploy from the PUBLISHED image instead of building,
    # set MANIMA_RENDER_IMAGE=ghcr.io/groscy/manima-render:pinned and run
    # `docker compose --profile image pull render-image` (or `make pull`) — the same var the
    # server reads, so the sandbox spawns containers from exactly what was pulled.
    image: ${MANIMA_RENDER_IMAGE:-manima-render:pinned}
    # Build-only: never started by a bare `docker compose up`.
    profiles: ["image"]
    # If ever run directly, just prints the Manim version rather than doing work.
    command: ["--version"]

  qdrant:
    image: qdrant/qdrant:v1.12.1
    # Generate path only. Absent from the render-only default (invariant 6, design D2).
    profiles: ["generate"]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant-storage:

# Hard tier — 3D scenes, camera movement, matrix operations (task 1.3).
#
# Almost everything here is high manimgl_risk: ThreeDScene, camera orientation, and
# LinearTransformationScene are among the most version-sensitive surfaces in Manim,
# and the ManimGL forms dominate the training distribution. This tier is where an 8B
# model is expected to struggle most and where the repair loop earns or fails to earn
# its budget.

- id: hard-01
  prompt: >
    Render the 3D surface z = sin(x) * cos(y) over a small domain and rotate the
    camera slowly around it.
  expected:
    - A 3D surface mobject for z = sin(x)cos(y) (Surface, not a flat plot)
    - A ThreeDScene with a set camera orientation
    - The camera orbits / ambient-rotates around the surface
  manimgl_risk: high
  notes: Surface class and camera API (set_camera_orientation, begin_ambient_rotation).

- id: hard-02
  prompt: Show a rotating 3D cube with labelled x, y, and z axes.
  expected:
    - A Cube mobject
    - 3D axes with three labelled directions
    - The cube rotates in 3D
  manimgl_risk: high

- id: hard-03
  prompt: >
    Visualise a 2x2 matrix transformation applied to a grid of vectors, showing the
    grid before and after the transformation.
  expected:
    - A coordinate grid (NumberPlane) that deforms under the matrix
    - A specific 2x2 matrix applied (grid lines map to their images)
    - Before and after states are both visible or clearly animated between
  manimgl_risk: high
  notes: LinearTransformationScene / apply_matrix — heavily ManimGL-flavoured in training data.

- id: hard-04
  prompt: Animate a 3D helix being drawn stroke by stroke.
  expected:
    - A parametric 3D helix (circular in x-y, rising in z)
    - Rendered in a 3D scene with a non-trivial camera angle
    - The curve is drawn progressively (Create), not popped in
  manimgl_risk: high

- id: hard-05
  prompt: >
    Start a 3D scene viewed from directly above, then move the camera to an oblique
    three-quarter view.
  expected:
    - A ThreeDScene with recognisable 3D content
    - Initial camera is top-down (phi near 0)
    - Camera animates to an oblique orientation (phi and theta both changed)
  manimgl_risk: high
  notes: move_camera / set_camera_orientation phi-theta convention differs across engines.

- id: hard-06
  prompt: Render a unit sphere with latitude and longitude lines and rotate it.
  expected:
    - A Sphere mobject
    - Visible lat/long gridlines on the surface
    - The sphere rotates about an axis
  manimgl_risk: high

- id: hard-07
  prompt: >
    Show a 2x2 matrix and highlight its eigenvectors as the directions that stay on
    their own span when the transformation is applied.
  expected:
    - A transformation of the plane by a specific 2x2 matrix
    - Two eigen-directions drawn and shown to remain on their span (only scaled)
    - Non-eigen vectors visibly rotate off their original direction for contrast
  manimgl_risk: high
  notes: >
    Semantically demanding: the eigenvectors must actually be correct for the chosen
    matrix, which the probe render cannot check — pure task-1.4 territory.

- id: hard-08
  prompt: Animate a 3D vector field.
  expected:
    - A 3D scene containing a vector field (ArrowVectorField / vectors on a 3D grid)
    - Arrows point along a coherent field, not randomly
    - Some motion (camera or field animation)
  manimgl_risk: high

- id: hard-09
  prompt: >
    Illustrate a change of basis by rotating a plane in 3D so that a set of basis
    vectors moves into a new orientation.
  expected:
    - A 3D scene with an initial basis (two or three basis vectors)
    - The basis rotates coherently to a new orientation
    - The transformation reads as a rotation, not an arbitrary scramble
  manimgl_risk: high

- id: hard-10
  prompt: >
    Render the graph of a complex function as a surface whose height encodes the
    magnitude, over a small region of the complex plane.
  expected:
    - A surface over a 2D domain (the complex plane region)
    - Height corresponds to |f(z)| for a stated function
    - Rendered as a 3D surface with a sensible camera angle
  manimgl_risk: high
  notes: >
    Genuinely hard even for a frontier model; a useful stress on the control condition
    (section 3), not only on Apertus.

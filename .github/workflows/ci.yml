# MANIMA CI (design D5, ci-pipeline spec).
#
# What runs here runs WITHOUT a GPU: the offline test suite, lint, spec validation, and a
# render-image build check. What does NOT run — and is not faked green — is the generate
# path's live behaviour (Apertus/vLLM, Qdrant grounding, GPU-bound rendering): a
# GitHub-hosted runner has neither a GPU nor the 16 GB VRAM it needs (task 6.5,
# ci-pipeline: "CI SHALL declare what it cannot run").
name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [manima_server, harness]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline core + dev toolchain)
        working-directory: ${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile + offline suite (stdlib-only — no GPU, no Docker)
        working-directory: ${{ matrix.package }}
        run: |
          python -m compileall -q .
          # pytest exits 5 when a package has no tests yet (the harness). Treat that as a
          # pass rather than fabricate a suite — the offline modules still compiled above.
          # The `|| code=$?` keeps `bash -e` from aborting on pytest's non-zero exit before
          # we can inspect it.
          code=0
          python -m pytest -q || code=$?
          if [ "$code" -eq 5 ]; then
            echo "::notice title=No tests::${{ matrix.package }} has no unit suite yet; compiled only."
            exit 0
          fi
          exit "$code"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff
        run: ruff check manima_server harness
      - name: Hadolint (render Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: manima_server/docker/Dockerfile
          config: .hadolint.yaml

  spec-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: openspec validate --specs --strict
        # Strict-validate the durable spec contract (what's merged and authoritative). In-flight
        # changes are validated by the author pre-merge via /opsx — some legitimately carry no
        # spec delta (e.g. a harness that touches no specs), so `--all` is not the CI gate.
        # The CLI (bin `openspec`) ships in the npm package @fission-ai/openspec.
        run: npx --yes @fission-ai/openspec@1.6.0 validate --specs --strict --no-interactive

  render-image:
    # Verify the pinned Dockerfile still builds on every push/PR (buildx layer cache makes
    # the multi-GB TeX Live layer a one-time cost). Publish to GHCR ONLY on a version tag
    # (tasks 6.4, 7.1) — authenticated with the built-in token, no operator secret.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: "Read pinned Manim CE version (single source: version.py)"
        id: pin
        working-directory: manima_server
        run: echo "version=$(python -c 'from manima_server.version import MANIM_CE_VERSION; print(MANIM_CE_VERSION)')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (push on tags only)
        uses: docker/build-push-action@v6
        with:
          context: manima_server/docker
          build-args: |
            MANIM_CE_VERSION=${{ steps.pin.outputs.version }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/groscy/manima-render:pinned
            ghcr.io/groscy/manima-render:${{ steps.pin.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
